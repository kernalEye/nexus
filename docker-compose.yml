services:

  postgres:
    image: postgres:17
    container_name: nexus-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: nexus-backend

    ports:
      - "4000:4000"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: nexus-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: